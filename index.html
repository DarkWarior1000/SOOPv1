
<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Uporządkuj etapy wdrożenia systemu okresowych ocen pracowniczych (SOOP)</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f6f9;
        margin: 40px;
    }

    h1 {
        text-align: center;
    }

    #instructions {
        text-align: center;
        margin-bottom: 20px;
    }

    .container {
        max-width: 900px;
        margin: auto;
    }

    ul {
        list-style-type: none;
        padding: 0;
    }

    li {
        background: white;
        margin: 8px 0;
        padding: 12px;
        border-radius: 6px;
        border: 1px solid #ccc;
        cursor: grab;
        transition: 0.2s;
    }

    li.dragging {
        opacity: 0.5;
    }

    button {
        margin-top: 20px;
        padding: 10px 18px;
        border: none;
        border-radius: 6px;
        background-color: #2c7be5;
        color: white;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background-color: #1a68d1;
    }

    #result {
        margin-top: 20px;
        font-weight: bold;
        text-align: center;
    }

    .correct {
        color: green;
    }

    .incorrect {
        color: red;
    }
</style>
</head>

<body>

<div class="container">
    <h1>Uporządkuj etapy wdrożenia systemu okresowych ocen pracowniczych (SOOP)</h1>
    <p id="instructions">
        Przeciągnij etapy tak, aby ustawić je w poprawnej kolejności procesu wdrożenia.
    </p>

    <ul id="list"></ul>

    <div style="text-align:center;">
        <button onclick="checkOrder()">Sprawdź poprawność</button>
        <button onclick="resetGame()">Resetuj</button>
    </div>

    <div id="result"></div>
</div>

<script>

const correctOrder = [
"Uzyskanie dla SOOP wsparcia ze strony zarządzających firmą",
"Sformułowanie celów oceny - dostosowane do potrzeb organizacji",
"Przygotowanie metodyki oceniania (metody oceny, zestaw kryteriów oceny, skala oceny, wagi)",
"Zaprojektowanie narzędzia ocen",
"Konsultacja rozwiązania w działach funkcjonalnych organizacji",
"Przeprowadzenie pilotażu wypracowanej metodyki i narzędzia",
"Działania informacyjne poprzedzające wdrożenie SOOP (wskazujące cel, potrzebę, korzyści dla pracownika i dla organizacji wynikające z ocen pracowniczych)",
"Przeprowadzenie szkolenia z umiejętności ocenienia: przeprowadzania rozmowy oceniającej, radzenia sobie z oporem ocenianych, asertywnego informowania o słabościach i atutach, wspólnego wypracowywania rozwiązań.",
"Przeprowadzenie szkolenia umożliwiającego zapoznanie się przez osoby oceniające z narzędziami oceny, zastosowanymi aplikacjami informatycznymi itp.",
"Monitorowanie realizacji działań związanych z oceną - zabezpieczyć czas i zorganizować miejsce na przygotowanie się do oceny i samooceny, rozpatrzyć ewentualne odwołania.",
"Wcielenie w życie rekomendowanych przez oceniających rozwiązań (planowanie szkoleń, awansowanie, włączanie poszczególnych pracowników do programów rozwoju)",
"Ciągłe usprawnianie"
];

const list = document.getElementById("list");

function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
}

function createList() {
    list.innerHTML = "";
    shuffle([...correctOrder]).forEach(item => {
        const li = document.createElement("li");
        li.textContent = item;
        li.draggable = true;
        list.appendChild(li);
    });
    addDragAndDrop();
}

function addDragAndDrop() {
    let draggedItem = null;

    document.querySelectorAll("#list li").forEach(item => {

        item.addEventListener("dragstart", function() {
            draggedItem = this;
            setTimeout(() => this.classList.add("dragging"), 0);
        });

        item.addEventListener("dragend", function() {
            this.classList.remove("dragging");
        });

        item.addEventListener("dragover", function(e) {
            e.preventDefault();
        });

        item.addEventListener("drop", function() {
            if (draggedItem !== this) {
                let items = [...list.children];
                let draggedIndex = items.indexOf(draggedItem);
                let droppedIndex = items.indexOf(this);

                if (draggedIndex < droppedIndex) {
                    list.insertBefore(draggedItem, this.nextSibling);
                } else {
                    list.insertBefore(draggedItem, this);
                }
            }
        });
    });
}

function checkOrder() {
    const currentOrder = [...list.children].map(li => li.textContent);
    const result = document.getElementById("result");

    if (JSON.stringify(currentOrder) === JSON.stringify(correctOrder)) {
        result.textContent = "✔ Brawo! Kolejność jest poprawna.";
        result.className = "correct";
    } else {
        result.textContent = "✘ Niestety kolejność jest niepoprawna. Spróbuj ponownie.";
        result.className = "incorrect";
    }
}

function resetGame() {
    createList();
    document.getElementById("result").textContent = "";
}

createList();

</script>

</body>
</html>
